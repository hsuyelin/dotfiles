# ═══════════════════════════════════════════════════════════════
#  uosc_danmaku.conf  —  danmaku rendering (base resolution 1920x1080)
#  NOTE: script-opts does NOT support inline comments; keep them on
#        their own line, above each key.
# ═══════════════════════════════════════════════════════════════

# Seconds a scrolling comment takes to cross the screen
scrolltime=20
# Seconds a top/bottom pinned comment stays on screen
fixtime=5
# Font: LXGW WenKai Mono Medium (霞鹜文楷等宽), matches OSD/subtitles
fontname=LXGW WenKai Mono Medium
# Font size (relative to the 1080p canvas, auto-scales to resolution)
fontsize=48
# Bold off: Medium weight already comes from the font
bold=no
# Outline keeps comments readable over dark backgrounds
outline=1.2
# Shadow
shadow=0
# Fraction of screen height comments may occupy (0.0-1.0)
displayarea=0.5
# Opacity, low enough not to block the main picture
opacity=0.55
# Blacklist file (one term per line, lua patterns), relative to this dir
blacklist_path=uosc_danmaku_black.txt
