# ═══════════════════════════════════════════════════════════════
#  uosc.conf  —  OSC / UI (migrated from ModernZ)
#  NOTE: script-opts does NOT support inline comments; every comment
#        must sit on its own line above the key it documents.
#  uosc renders its whole UI with mpv's `osd-font` (Source Han Sans SC,
#  see mpv.conf). Reference: https://github.com/tomasklaen/uosc
# ═══════════════════════════════════════════════════════════════

# ───────────────────────── Timeline ─────────────────────────────
# line | bar
timeline_style=line
timeline_line_width=2
# Fully-expanded height in px
timeline_size=40
# Top border to visually separate the timeline from the video
timeline_border=1
# Seconds per wheel-scroll seek above the timeline
timeline_step=5
# Show cached ranges for streamed content
timeline_cache=yes

# Always-visible minimized progress bar (windowed only)
progress=windowed
progress_size=2
progress_line_width=20

# ───────────────────────── Controls ─────────────────────────────
# Bottom control bar. The danmaku items (button:danmaku,
# button:danmaku_menu, show_danmaku@uosc_danmaku) are provided by the
# uosc_danmaku script and only work under uosc — this is the core
# reason for the ModernZ -> uosc migration.
controls=cycle:play_arrow:pause:no=pause/yes=play_arrow?播放 / 暂停,menu,gap,subtitles,<has_many_audio>audio,<has_many_video>video,<has_many_edition>editions,<stream>stream-quality,button:danmaku,button:danmaku_menu,cycle:toggle_on:show_danmaku@uosc_danmaku:on=toggle_on/off=toggle_off?弹幕开关,gap,space,speed,space,shuffle,loop-playlist,loop-file,toggle:push_pin:ontop?窗口置顶,gap,prev,items,next,gap,fullscreen
controls_size=32
controls_margin=8
controls_spacing=2

# ───────────────────────── Volume ───────────────────────────────
# none | left | right
volume=right
volume_size=40
volume_border=1
volume_step=1

# ───────────────────────── Speed ────────────────────────────────
speed_step=0.1
speed_step_is_factor=no

# ───────────────────────── Menus ────────────────────────────────
menu_item_height=36
menu_min_width=260
menu_padding=4
# Start typing to filter menu entries
menu_type_to_search=yes

# ───────────────────────── Top bar ──────────────────────────────
# Window controls + media title, shown when borderless
top_bar=no-border
top_bar_size=40
top_bar_controls=right
# Inherit the media title from mpv
top_bar_title=yes
top_bar_flash_on=video,audio

# Window border drawn while in no-border mode
window_border_size=1

# ───────────────────────── Look & feel ──────────────────────────
scale=1
scale_fullscreen=1.3
font_scale=1
text_border=1.2
border_radius=4
# Medium weight already supplied by the font
font_bold=no
# Orange accent. Drives the timeline fill, slider handle and active controls.
color=foreground=ff8232
animation_duration=100
proximity_in=40
proximity_out=120
pause_indicator=flash
destination_time=playtime-remaining
time_precision=0
buffered_time_threshold=60
adjust_osd_margins=yes

# ─────────────────── Chapters (anime OP/ED ranges) ──────────────
chapter_ranges=openings:30abf964,endings:30abf964,ads:c54e4e80
chapter_range_patterns=openings:オープニング;endings:エンディング

# ─────────────────── Localization / files ───────────────────────
# Simplified Chinese UI first, English fallback (built-in uosc/intl)
languages=zh-hans,en
subtitles_directory=~~/subtitles
default_directory=~/
load_types=video,audio,image
use_trash=no
