# ═══════════════════════════════════════════════════════════════
#  console.conf  —  font for the built-in command console (REPL)
#  uosc now provides the menus; this only styles the `:` console.
# ═══════════════════════════════════════════════════════════════

# Console font: Source Han Sans SC Medium (思源黑体, full CJK coverage)
monospace_font=Source Han Sans SC Medium
font_size=16
scale_with_window=yes
