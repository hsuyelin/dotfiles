# ═══════════════════════════════════════════════════════════════
#  input.conf  —  key & mouse bindings
#  Reference: https://mpv.io/manual/master/#command-interface
# ═══════════════════════════════════════════════════════════════

# ───────────────────────── Playback ─────────────────────────────
SPACE         cycle pause                                   # play / pause
MBTN_MID      cycle pause                                   # middle click: play/pause
RIGHT         seek 5                                        # seek +5s
LEFT          seek -5                                       # seek -5s
Shift+RIGHT   seek 60                                       # seek +60s
Shift+LEFT    seek -60                                      # seek -60s
.             frame-step                                    # step one frame forward
,            frame-back-step                                # step one frame backward
[             multiply speed 0.9091                         # slow down
]             multiply speed 1.1                            # speed up
BS            set speed 1.0                                 # reset speed
PGUP          add chapter 1                                 # next chapter
PGDWN         add chapter -1                                # previous chapter
<             playlist-prev                                 # previous file
>             playlist-next                                 # next file

# ─────────────────────── Volume ─────────────────────────────────
UP            add volume 5                                  # volume +5
DOWN          add volume -5                                 # volume -5
m             cycle mute                                    # toggle mute

# ─────────────── Zoom / aspect / window / view ──────────────────
Ctrl+=        add video-zoom 0.1                            # zoom in
Ctrl+-        add video-zoom -0.1                           # zoom out
Ctrl+0        set video-zoom 0                              # reset zoom
Ctrl+r        cycle-values video-rotate 0 90 180 270        # rotate video
a             cycle-values video-aspect-override 16:9 4:3 2.35:1 0 -1  # aspect ratio
f             cycle fullscreen                              # toggle fullscreen
ENTER         cycle fullscreen
KP_ENTER      cycle fullscreen
MBTN_LEFT_DBL cycle fullscreen                              # double click: fullscreen
ESC           set fullscreen no                             # leave fullscreen
Ctrl+t        cycle ontop                                   # keep window on top
ALT+z         no-osd cycle-values osd-level 3 1             # cycle OSD verbosity

# ─────────────────── Subtitle / audio sync ──────────────────────
v             cycle sub-visibility                          # show / hide subtitles
j             cycle sub                                     # next subtitle track
J             cycle sub down                                # previous subtitle track
z             add sub-delay -0.1                            # subtitle earlier
Z             add sub-delay 0.1                             # subtitle later
Ctrl+LEFT     add audio-delay -0.1                          # audio earlier
Ctrl+RIGHT    add audio-delay 0.1                           # audio later
Alt+a         cycle audio                                   # next audio track

# ─────────────────── Subtitle / danmaku tools ───────────────────
Alt+f         script-message-to sub_assrt sub-assrt         # search subtitles online
Ctrl+d        script-message open_search_danmaku_menu       # search danmaku
d             script-message show_danmaku_keyboard          # toggle danmaku
Alt+d         script-message open_add_total_menu            # danmaku master switch

# ─────────────────── Screenshot / info / menu ───────────────────
s             screenshot                                    # screenshot (with subs)
S             screenshot video                              # screenshot (no subs/OSD)
i             script-binding stats/display-stats-toggle     # toggle statistics overlay
MBTN_RIGHT    script-binding select/menu                    # right click: context menu

