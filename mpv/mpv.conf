# ═══════════════════════════════════════════════════════════════
#  mpv.conf
#  Primary target : macOS (Apple Silicon / arm64)
#  Also supports  : Linux (experimental, see [linux] profile below)
#  Manual         : https://mpv.io/manual/master/
# ═══════════════════════════════════════════════════════════════

# ───────────────────────── Video output ─────────────────────────
vo=gpu-next                 # libplacebo renderer, best quality on M-series
gpu-api=auto                # pick Metal/OpenGL (macOS) or Vulkan/OpenGL (Linux)
hwdec=auto-safe             # HW decode: VideoToolbox / VAAPI / NVDEC, safe fallback
profile=high-quality        # ewa_lanczossharp + high-quality scalers (4K ready)
deband=yes                  # smooth gradients / banding on 4K panels
video-sync=display-resample # sync frames to display refresh for smoothness

# ─────────────── Color / HDR (uncomment to force) ───────────────
# target-colorspace-hint=yes
# tone-mapping=bt.2390
# hdr-compute-peak=yes

# ──────────────────── Window (4K display) ───────────────────────
geometry=50%:50%            # center the window on screen
autofit-larger=75%x75%      # never exceed 75% of the screen
autofit-smaller=30%x30%     # never shrink below 30% of the screen
keepaspect-window=yes       # keep aspect ratio while resizing
border=no                   # borderless window
keep-open=yes               # stay on last frame instead of closing

# ─────────────────────── Cache / network ────────────────────────
cache=yes
demuxer-max-bytes=150MiB
demuxer-readahead-secs=20

# ───────────────────────────── Fonts ────────────────────────────
# uosc renders its whole UI (menus, top bar, timeline) with osd-font,
# so the interface uses Source Han Sans SC Medium (思源黑体).
# Subtitles keep LXGW WenKai Mono Medium; stats overlay uses LXGW too
# (see script-opts/stats.conf), danmaku as well (uosc_danmaku.conf).
osd-font=Source Han Sans SC Medium
sub-font=LXGW WenKai Mono Medium

# ──────── Subtitles (theme accent: warm white on dark outline) ───
sub-color='#F2F4F8'         # neutral cool white, pairs with the blue UI
sub-border-color='#1A1A1A'  # dark outline for contrast
sub-border-size=2.4         # moderate outline, not too heavy
sub-shadow-offset=0         # outline only, no extra shadow
sub-font-size=42
blend-subtitles=yes         # blend subs into the frame for cleaner edges
sub-auto=fuzzy              # auto-load loosely matched external subs
sub-ass-override=scale      # honor styled subs but scale to our size

# ───────────── OSD (top-right status: position + clock) ──────────
osc=no                      # disabled: uosc provides the OSC
osd-level=1                 # show status only on state change
osd-status-msg=${time-pos}/${duration}\n🕒 ${clock}
osd-align-x=right
osd-font-size=18
osd-color='#F2F4F8'
osd-border-color='#1A1A1A'
osd-border-size=1.5
osd-bold=no                 # Medium weight already comes from the font
osd-bar=no

# ───────────────────────────── Audio ────────────────────────────
audio-file-auto=fuzzy
volume=70
volume-max=130              # allow up to 130% software boost

# ────────────────────── Session / logging ───────────────────────
save-position-on-quit=yes
# don't restore sub/osd margins (avoids uosc positioning conflict)
watch-later-options-remove=sub-pos
watch-later-options-remove=osd-margin-y
icc-profile-auto=no         # skip ICC probing for faster startup
load-context-menu=yes
screenshot-directory=~~desktop/mpv
screenshot-template=mpv-%F-%P
log-file=~~/log/mpv.log     # logs land in <config>/mpv/log/

# ──────────── Linux tuning (experimental) ───────────────────────
# Run with:  mpv --profile=linux
# The base config above is already cross-platform thanks to auto
# detection; this profile only adds Linux-specific hints.
[linux]
profile-desc=Experimental Linux tuning
gpu-api=auto
hwdec=auto-safe
# NVIDIA   : hwdec=nvdec-copy
# Intel/AMD: hwdec=vaapi
