# dirs  вҶ’ exact directory name
# files вҶ’ exact filename (highest specificity, beats exts)
# exts  вҶ’ extension WITHOUT leading dot
# conds вҶ’ special conditions (link, exec, dir, вҖҰ)

[icon]

