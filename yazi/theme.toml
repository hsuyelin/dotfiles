# Points to flavors/catppuccin-mocha.yazi/flavor.toml.
# Swap "dark" to "catppuccin-latte" to use the light variant.

[flavor]
dark  = "catppuccin-mocha"
light = "catppuccin-mocha"

# в”Җв”Җ Code syntax highlighting в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Reuse the same Catppuccin Mocha .tmTheme used by bat for identical colors
# in both the file previewer and bat-driven pagers.

[mgr]
syntect_theme = "~/.config/bat/themes/Catppuccin Mocha.tmTheme"

# в”Җв”Җ Icons в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
