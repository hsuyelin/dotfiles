# vim:ft=tmux

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

# ── Terminal & Colors ─────────────────────────────────────────────────────────
# Use tmux-256color inside tmux (never inherit $TERM directly)
set -g default-terminal "tmux-256color"

# True color (24-bit) passthrough
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-ghostty:RGB"

# Extended key reporting (Kitty keyboard protocol): lets Shift+Enter, Ctrl+Enter,
# etc. arrive as distinct sequences instead of collapsing into plain Enter.
# Wildcard covers Ghostty (xterm-ghostty), Kitty (xterm-kitty), iTerm2 3.4+
# (xterm-256color). Terminals that don't support extkeys silently ignore the
# enable sequence, so this is safe to apply universally.
set -g extended-keys always
set -as terminal-features '*:extkeys'

# OSC 8 hyperlink support: tmux rewrites OSC 8 sequences so the outer terminal
# (Ghostty / Kitty / iTerm2) receives them intact. Cmd+click then opens the
# link natively. allow-passthrough above handles other OSC sequences; this
# flag is specifically required for hyperlinks.
set -as terminal-features '*:hyperlinks'

# Italics
set -as terminal-overrides ',xterm*:sitm=\E[3m'

# Undercurl + undercurl colors
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# OSC passthrough — lets panes forward notification sequences (OSC 99, etc.)
# to the outer terminal. Required for `notify` to work inside tmux.
set -g allow-passthrough on

# ── General ───────────────────────────────────────────────────────────────────
set -g history-limit 20000
set -g renumber-windows on
set-option -g status-interval 3
set -g status-position bottom
set -g escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set-option -g focus-events on
set-option -g set-titles on
set-option -g set-titles-string "#T - #W"
set -g set-clipboard on
setw -g mouse on

# ── Mode ──────────────────────────────────────────────────────────────────────
setw -g mode-keys vi
set -g status-keys vi

# ── Window naming ─────────────────────────────────────────────────────────────
setw -g automatic-rename on
# Use built-in format: show current command or directory name
set-option -g automatic-rename-format "#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{pane_current_command}}"

# ── Activity ──────────────────────────────────────────────────────────────────
setw -g monitor-activity off
set -g visual-activity off

# ── Prefix ────────────────────────────────────────────────────────────────────
set -g prefix C-a
bind C-a send-prefix
bind-key a send-prefix

# ── Key Bindings ──────────────────────────────────────────────────────────────

# Reload config
bind r source-file "$XDG_CONFIG_HOME/tmux/tmux.conf" \; display "Config Reloaded!"

# New window keeping CWD
unbind c
bind c new-window -c "#{pane_current_path}"

# Split panes keeping CWD
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Close current pane without confirmation
bind q kill-pane

# Close current window (tab) without confirmation
bind Q kill-window

# Tile layout
unbind =
bind = select-layout tiled

# Clear screen
bind C-l send-keys 'C-l'

# Synchronize panes (prefix + y)
bind y setw synchronize-panes

# Rename pane
bind P command-prompt -p "Pane name:" "select-pane -T '%%'"

# Session chooser (built-in popup)
unbind s
bind s choose-tree -Zs

# Session picker (Option+R → M-r): forward raw Escape+r bytes to current pane.
# send-keys M-r sends a tmux key-name token, not the raw ESC byte zsh expects.
# send-keys Escape r sends the two literal bytes \x1b + r, which matches
# zsh's bindkey '\er' and fires _tmux_session_picker_widget in the pane.
bind-key -n M-r send-keys Escape r

# Toggle status bar
bind-key -T prefix T set-option -g status

# ── Nested tmux (SSH) passthrough ─────────────────────────────────────────────
# Ctrl+\: suspend outer tmux prefix so all keystrokes flow through to the inner
# (SSH-side) tmux unmodified. Press Ctrl+\ again to restore outer tmux control.
# Useful when outer and inner tmux share the same prefix (Ctrl+a).
# Alternative (always works without config): Ctrl+a Ctrl+a <key> sends <key>
# to the inner tmux via the existing `bind C-a send-prefix` binding.
bind -T root 'C-\' \
    set prefix None \;\
    set key-table off \;\
    set status-right "#[fg=colour255,bg=colour160,bold] PASSTHROUGH (C-\\ to exit) " \;\
    refresh-client -S

bind -T off 'C-\' \
    set -u prefix \;\
    set -u key-table \;\
    set -u status-right \;\
    refresh-client -S

# Resize panes
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

# Lazygit popup
bind-key g display-popup -w "80%" -h "80%" -d "#{pane_current_path}" -E "lazygit"

# ── Copy Mode ─────────────────────────────────────────────────────────────────
unbind [
bind Escape copy-mode
unbind p
bind p paste-buffer

bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi V   send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# y / mouse drag → system clipboard
# macOS: pbcopy  Linux: prefer wl-copy (Wayland) → xclip (X11) → xsel fallback
if-shell "[ $(uname -s) = Darwin ]" {
  bind-key -T copy-mode-vi y \
      send-keys -X copy-pipe-and-cancel "pbcopy"
  bind-key -T copy-mode-vi MouseDragEnd1Pane \
      send-keys -X copy-pipe-and-cancel "pbcopy"
  bind-key -T copy-mode-vi DoubleClick1Pane \
      select-pane \; send-keys -X select-word \; send-keys -X copy-pipe-and-cancel "pbcopy"
  bind-key -T root DoubleClick1Pane \
      select-pane \; copy-mode -M \; send-keys -X select-word \; \
      send-keys -X copy-pipe-and-cancel "pbcopy"
} {
  bind-key -T copy-mode-vi y \
      send-keys -X copy-pipe-and-cancel "sh -c 'command -v wl-copy >/dev/null && wl-copy || command -v xclip >/dev/null && xclip -selection clipboard || xsel --clipboard --input'"
  bind-key -T copy-mode-vi MouseDragEnd1Pane \
      send-keys -X copy-pipe-and-cancel "sh -c 'command -v wl-copy >/dev/null && wl-copy || command -v xclip >/dev/null && xclip -selection clipboard || xsel --clipboard --input'"
  bind-key -T copy-mode-vi DoubleClick1Pane \
      select-pane \; send-keys -X select-word \; send-keys -X copy-pipe-and-cancel "sh -c 'command -v wl-copy >/dev/null && wl-copy || command -v xclip >/dev/null && xclip -selection clipboard || xsel --clipboard --input'"
  bind-key -T root DoubleClick1Pane \
      select-pane \; copy-mode -M \; send-keys -X select-word \; \
      send-keys -X copy-pipe-and-cancel "sh -c 'command -v wl-copy >/dev/null && wl-copy || command -v xclip >/dev/null && xclip -selection clipboard || xsel --clipboard --input'"
}

# ── Vim / tmux smart navigation ───────────────────────────────────────────────
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\' 'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# ── Status bar visibility ─────────────────────────────────────────────────────
if-shell "[ -z \"$TMUX_MINIMAL\" ]" {
  set -g status on
} {
  set -g status off
  set-hook -g after-new-window      'if "[ #{session_windows} -gt 1 ]" "set status on"'
  set-hook -g after-kill-pane       'if "[ #{session_windows} -lt 2 ]" "set status off"'
  set-hook -g pane-exited           'if "[ #{session_windows} -lt 2 ]" "set status off"'
  set-hook -g window-layout-changed 'if "[ #{session_windows} -lt 2 ]" "set status off"'
}

# ── Theme / Plugins ───────────────────────────────────────────────────────────
# All catppuccin options must be set BEFORE any run/run-shell so they take
# effect when the plugin loads (catppuccin uses -ogq which only sets if unset)
set -g @catppuccin_flavor 'mocha'

set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #{b:pane_current_path}"
set -g @catppuccin_window_current_text " #{b:pane_current_path}"

# macOS: "none" → truly transparent, inherits Ghostty's background-opacity + blur.
# Linux: use solid #1e1e2e (Catppuccin Mocha base) — no terminal blur support.
if-shell "[ $(uname -s) = Darwin ]" {
  set -g @catppuccin_status_background "none"
} {
  set -g @catppuccin_status_background "#1e1e2e"
}

# "no" → each module renders as an independent pill with a gap between them
set -g @catppuccin_status_connect_separator "no"

# tmux-cpu and tmux-battery interpolate format variables by scanning
# status-right/left as plain strings. catppuccin v2 stores module content in
# custom options via #{E:}, so the scan never reaches these variables and they
# render as literal text. Fix: call the scripts directly with #() instead.
set -g @catppuccin_cpu_text " #($HOME/.config/tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh)"
set -g @catppuccin_battery_icon "#($HOME/.config/tmux/plugins/tmux-battery/scripts/battery_icon.sh) "
set -g @catppuccin_battery_text " #($HOME/.config/tmux/plugins/tmux-battery/scripts/battery_percentage.sh)"

# CPU: @catppuccin_status_cpu_text_bg defaults to #{l:#{cpu_bg_color}}, which
# requires tmux-cpu string interpolation to resolve. Since we bypassed that
# interpolation above, cpu_bg_color is never substituted → text_bg falls back
# to icon_bg → icon and percentage appear as one unified pill. Fix: force
# text_bg to the standard module text background so the two sections are
# visually distinct (icon in darker colored block, % in lighter surface block).
set -g @catppuccin_status_cpu_text_bg "#{E:@catppuccin_status_module_text_bg}"
set -g @catppuccin_status_cpu_text_fg "#{@thm_fg}"

# RAM: same bypass approach as CPU — call the script directly.
set -g @catppuccin_ram_text " #($HOME/.config/tmux/plugins/tmux-cpu/scripts/ram_percentage.sh)"
set -g @catppuccin_status_ram_text_bg "#{E:@catppuccin_status_module_text_bg}"
set -g @catppuccin_status_ram_text_fg "#{@thm_fg}"

set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

# Session persistence — manual save/restore only (resurrect file survives reboots on disk)
# Save: prefix + Ctrl-s   Restore: prefix + Ctrl-r
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-dir '~/.local/share/tmux/resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Auto-install TPM if missing, then immediately install all declared plugins.
# Runs silently on a fresh machine; on subsequent starts the directory already
# exists so the if-shell condition is false and nothing is executed.
if-shell "test ! -d $HOME/.config/tmux/plugins/tpm" \
    "run 'git clone --depth=1 -q https://github.com/tmux-plugins/tpm $HOME/.config/tmux/plugins/tpm \
         && $HOME/.config/tmux/plugins/tpm/bin/install_plugins'"

# Initialize TPM (loads all plugins including catppuccin, cpu, battery)
run-shell "$HOME/.config/tmux/plugins/tpm/tpm"

# Per README: for TPM users, explicitly run catppuccin AFTER tpm so the
# @catppuccin_status_* variables exist before status-right is rendered.
# Use -ag (no -F) so format strings are stored literally and evaluated lazily
# at render time rather than expanded at set time when variables may be empty.
run "$HOME/.config/tmux/plugins/tmux/catppuccin.tmux"
# Rebuild window-status-format with transparent-compatible separators.
# catppuccin bakes the format via -gF at load time; with status_background
# "none", @_ctp_status_bg = "none" -> fg=none -> black. This script
# overwrites the format using fg=tab_color,bg=default instead of reverse.
run-shell "$HOME/.config/tmux/fix-window-format.sh"
run "$HOME/.config/tmux/plugins/tmux-cpu/cpu.tmux"
run "$HOME/.config/tmux/plugins/tmux-battery/battery.tmux"
# Sets @battery_exists = "true"/"false"; evaluated lazily in status-right below
run "$HOME/.config/tmux/plugins/tmux-battery/battery_enabled.tmux"

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -ag status-right "#{?#{==:#{@battery_exists},true},#{E:@catppuccin_status_battery},}"
