# vim:ft=tmux

# ── Terminal & Colors ─────────────────────────────────────────────────────────
# Use tmux-256color inside tmux (never inherit $TERM directly)
set -g default-terminal "tmux-256color"

# True color (24-bit) passthrough
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-ghostty:RGB"

# Extended key reporting (Kitty keyboard protocol): lets Shift+Enter, Ctrl+Enter,
# etc. arrive as distinct sequences instead of collapsing into plain Enter.
# Wildcard covers Ghostty (xterm-ghostty), Kitty (xterm-kitty), iTerm2 3.4+
# (xterm-256color). Terminals that don't support extkeys silently ignore the
# enable sequence, so this is safe to apply universally.
set -g extended-keys on
set -as terminal-features '*:extkeys'

# Italics
set -as terminal-overrides ',xterm*:sitm=\E[3m'

# Undercurl + undercurl colors
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# ── General ───────────────────────────────────────────────────────────────────
set -g history-limit 20000
set -g renumber-windows on
set-option -g status-interval 3
set -g status-position top
set -g escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set-option -g focus-events on
set-option -g set-titles on
set-option -g set-titles-string "#T - #W"
set -g set-clipboard on
setw -g mouse on

# ── Mode ──────────────────────────────────────────────────────────────────────
setw -g mode-keys vi
set -g status-keys vi

# ── Window naming ─────────────────────────────────────────────────────────────
setw -g automatic-rename on
# Use built-in format: show current command or directory name
set-option -g automatic-rename-format "#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{pane_current_command}}"

# ── Activity ──────────────────────────────────────────────────────────────────
setw -g monitor-activity off
set -g visual-activity off

# ── Prefix ────────────────────────────────────────────────────────────────────
set -g prefix C-a
bind C-a send-prefix
bind-key a send-prefix

# ── Key Bindings ──────────────────────────────────────────────────────────────

# Reload config
bind r source-file "$XDG_CONFIG_HOME/tmux/tmux.conf" \; display "Config Reloaded!"

# New window keeping CWD
unbind c
bind c new-window -c "#{pane_current_path}"

# Split panes keeping CWD
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Close current pane without confirmation
bind q kill-pane

# Close current window (tab) without confirmation
bind Q kill-window

# Tile layout
unbind =
bind = select-layout tiled

# Clear screen
bind C-l send-keys 'C-l'

# Synchronize panes (prefix + y)
bind y setw synchronize-panes

# Rename pane
bind P command-prompt -p "Pane name:" "select-pane -T '%%'"

# Session chooser (built-in popup)
unbind s
bind s choose-tree -Zs

# Session picker (Option+R → M-r): forward raw Escape+r bytes to current pane.
# send-keys M-r sends a tmux key-name token, not the raw ESC byte zsh expects.
# send-keys Escape r sends the two literal bytes \x1b + r, which matches
# zsh's bindkey '\er' and fires _tmux_session_picker_widget in the pane.
bind-key -n M-r send-keys Escape r

# Toggle status bar
bind-key -T prefix T set-option -g status

# Resize panes
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

# Lazygit popup
bind-key g display-popup -w "80%" -h "80%" -d "#{pane_current_path}" -E "lazygit"

# ── Copy Mode ─────────────────────────────────────────────────────────────────
unbind [
bind Escape copy-mode
unbind p
bind p paste-buffer

bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi V   send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# y / mouse drag → system clipboard (macOS pbcopy)
bind-key -T copy-mode-vi y \
    send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane \
    send-keys -X copy-pipe-and-cancel "pbcopy"

# Double-click: select word and copy immediately (works in normal mode too)
bind-key -T copy-mode-vi DoubleClick1Pane \
    select-pane \; send-keys -X select-word \; send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T root DoubleClick1Pane \
    select-pane \; copy-mode -M \; send-keys -X select-word \; \
    send-keys -X copy-pipe-and-cancel "pbcopy"

# ── Vim / tmux smart navigation ───────────────────────────────────────────────
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\' 'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# ── Status bar visibility ─────────────────────────────────────────────────────
if-shell "[ -z \"$TMUX_MINIMAL\" ]" {
  set -g status on
} {
  set -g status off
  set-hook -g after-new-window      'if "[ #{session_windows} -gt 1 ]" "set status on"'
  set-hook -g after-kill-pane       'if "[ #{session_windows} -lt 2 ]" "set status off"'
  set-hook -g pane-exited           'if "[ #{session_windows} -lt 2 ]" "set status off"'
  set-hook -g window-layout-changed 'if "[ #{session_windows} -lt 2 ]" "set status off"'
}

# ── Theme / Plugins ───────────────────────────────────────────────────────────
# Official Catppuccin TPM install: https://github.com/catppuccin/tmux
set -g @catppuccin_flavor 'mocha'

# Window tab style
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #{b:pane_current_path}"
set -g @catppuccin_window_current_text " #{b:pane_current_path}"

# Right side: completely empty
set -g @catppuccin_status_modules_right ""
set -g @catppuccin_status_modules_left ""
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator ""
set -g status-right ""

# Transparent status bar background
set -g @catppuccin_status_background "none"
set -g status-style bg=default

set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Initialize TPM (keep at very bottom)
run-shell "$HOME/.config/tmux/plugins/tpm/tpm"
