<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Dotfiles">
  <defs>
    <!-- Catppuccin Mocha: subtle radial lift on the dark base -->
    <radialGradient id="bg" cx="50%" cy="28%" r="72%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#2a2a40"/>
      <stop offset="100%" stop-color="#1e1e2e"/>
    </radialGradient>

    <!-- Prompt chevron: mauve → blue (Catppuccin accent) -->
    <linearGradient id="chevron" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#cba6f7"/>
      <stop offset="100%" stop-color="#89b4fa"/>
    </linearGradient>

    <!-- Cursor: soft glow -->
    <filter id="cursor-glow" x="-40%" y="-20%" width="180%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="52" fill="url(#bg)"/>

  <!-- macOS traffic-light dots (Catppuccin red / yellow / green) -->
  <circle cx="50"  cy="54" r="9" fill="#f38ba8"/>
  <circle cx="78"  cy="54" r="9" fill="#f9e2af"/>
  <circle cx="106" cy="54" r="9" fill="#a6e3a1"/>

  <!-- Title-bar divider -->
  <line x1="24" y1="76" x2="232" y2="76" stroke="#313244" stroke-width="1.5"/>

  <!-- Prompt chevron ❯ drawn as a path (no font dependency) -->
  <polyline
    points="54,116 118,164 54,212"
    fill="none"
    stroke="url(#chevron)"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Blinking cursor block -->
  <rect x="134" y="138" width="40" height="52" rx="6"
        fill="#cdd6f4" opacity="0.92" filter="url(#cursor-glow)"/>
</svg>
