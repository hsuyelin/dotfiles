# ══════════════════════════════════════════════════════════════════════════════
# Kitty Configuration
# Mirrors the Ghostty setup for kitty users. Primary terminal is Ghostty;
# this config exists purely for compatibility. Feature parity notes are
# annotated inline where kitty imposes hard limits.
# ══════════════════════════════════════════════════════════════════════════════

# ── Shell ─────────────────────────────────────────────────────────────────────
# Mirrors: shell-integration = zsh  /  shell-integration-features = cursor,sudo,title
shell                           /bin/zsh --login --interactive
shell_integration               enabled

# ── Font ──────────────────────────────────────────────────────────────────────
# Ghostty uses FiraCode Nerd Font Mono Ret (Retina) + font-thicken = true.
# Retina is a custom weight lighter than Regular; font-thicken applies macOS
# CoreText weight compensation that kitty does not support. Using Medium here
# to compensate — go up to SemiBold if still too thin.
font_family                     FiraCode Nerd Font Mono Med
bold_font                       FiraCode Nerd Font Mono SemBd
italic_font                     FiraCode Nerd Font Mono Med
bold_italic_font                FiraCode Nerd Font Mono SemBd
font_size                       16.0

# Ligatures + contextual alternates — mirrors: font-feature = +liga / +calt
# PS names: verify with `kitty +list-fonts --psnames | grep FiraCode`
font_features                   FiraCodeNerdFontMono-Medium   +liga +calt
font_features                   FiraCodeNerdFontMono-SemiBold +liga +calt

# Mirrors: adjust-cell-height = 2
modify_font                     cell_height +2px

# ── CJK Symbol Map → LXGW WenKai Mono ────────────────────────────────────────
# Mirrors: font-codepoint-map = U+XXXX-U+XXXX=LXGW WenKai Mono
symbol_map                      U+4E00-U+9FFF  LXGW WenKai Mono
symbol_map                      U+3400-U+4DBF  LXGW WenKai Mono
symbol_map                      U+F900-U+FAFF  LXGW WenKai Mono
symbol_map                      U+3000-U+303F  LXGW WenKai Mono
symbol_map                      U+FF00-U+FFEF  LXGW WenKai Mono
symbol_map                      U+2E80-U+2EFF  LXGW WenKai Mono

# ── Appearance ────────────────────────────────────────────────────────────────
# Catppuccin Mocha — mirrors: theme = Catppuccin Mocha
include                         themes/catppuccin-mocha.conf

# Mirrors: background-opacity = 0.7  /  background-blur-radius = 25
background_opacity              0.7
background_blur                 25

# ── Cursor ────────────────────────────────────────────────────────────────────
# Mirrors: cursor-style = bar  /  adjust-cursor-thickness = 1
cursor_shape                    beam
cursor_beam_thickness           1.5

# Mirrors: cursor-style-blink = true
cursor_blink_interval           0.5
cursor_stop_blinking_after      0

# NOTE: kitty does not support cursor opacity or custom GLSL shaders.
#       Ghostty's cursor-opacity = 0.6 and cursor_warp.glsl cannot be replicated.

# ── Window ────────────────────────────────────────────────────────────────────
# Mirrors: window-width = 120  /  window-height = 40  (in character cells)
initial_window_width            160c
initial_window_height           44c

# Mirrors: window-padding-x = 8  /  window-padding-y = 8
window_padding_width            8

# Mirrors: window-save-state = always
remember_window_size            yes

# ── Tab Bar ───────────────────────────────────────────────────────────────────
# Mirrors: macos-titlebar-style = tabs (tabs integrated at top)
tab_bar_edge                    top
tab_bar_style                   powerline
tab_powerline_style             slanted
tab_title_template              {index}: {title}
tab_bar_min_tabs                1

# ── macOS ─────────────────────────────────────────────────────────────────────
# Mirrors: macos-option-as-alt = true
macos_option_as_alt             yes

# Mirrors: macos-titlebar-proxy-icon = hidden (minimal title bar)
hide_window_decorations         titlebar-only

# Mirrors: clipboard-paste-protection = true
paste_actions                   quote-urls-at-prompt,confirm

# ── Performance ───────────────────────────────────────────────────────────────
# Mirrors: scrollback-limit = 25000000 bytes; kitty uses line count.
scrollback_lines                100000

# ── Keybindings ───────────────────────────────────────────────────────────────
# Mirrors Ghostty keybinds. kitty "windows" = Ghostty splits.
# kitty "tabs"    = Ghostty tabs.

# Tabs — mirrors: cmd+t / cmd+shift+left / cmd+shift+right / cmd+w
map cmd+t                       new_tab_with_cwd
map cmd+shift+left              previous_tab
map cmd+shift+right             next_tab
map cmd+w                       close_tab

# Splits — mirrors: cmd+d=new_split:right / cmd+shift+d=new_split:down
map cmd+d                       launch --location=vsplit --cwd=current
map cmd+shift+d                 launch --location=hsplit --cwd=current

# Navigate splits — mirrors: cmd+alt+arrow / ctrl+shift+hjkl
map cmd+alt+left                neighboring_window left
map cmd+alt+right               neighboring_window right
map cmd+alt+up                  neighboring_window top
map cmd+alt+down                neighboring_window bottom
map ctrl+shift+h                neighboring_window left
map ctrl+shift+l                neighboring_window right
map ctrl+shift+k                neighboring_window top
map ctrl+shift+j                neighboring_window bottom

# Equalize splits — mirrors: cmd+shift+e=equalize_splits
map cmd+shift+e                 layout_action normalize

# Zoom split — mirrors: cmd+shift+f=toggle_split_zoom
map cmd+shift+f                 toggle_layout stack

# Font size — mirrors: cmd+plus / cmd+minus / cmd+zero
map cmd+equal                   change_font_size all +1.0
map cmd+minus                   change_font_size all -1.0
map cmd+0                       change_font_size all 0

# Reload config — mirrors: cmd+shift+comma=reload_config
map cmd+shift+,                 load_config_file

# NOTE: Ghostty's global:ctrl+grave_accent quick-terminal (system-wide hotkey)
#       has no equivalent in kitty — kitty cannot register system-wide hotkeys.
