name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Cache git pack objects so re-runs on the same runner skip re-fetching.
      - name: Restore git pack cache
        uses: actions/cache@v4
        with:
          path: .git/objects/pack
          key: git-pack-${{ github.sha }}
          restore-keys: |
            git-pack-

      # ── Version metadata ───────────────────────────────────────────────────
      - name: Resolve version metadata
        id: meta
        run: |
          current="${GITHUB_REF_NAME}"
          prev=$(git tag --sort=-version:refname \
                   | grep -vxF "${current}" | head -1 || true)
          echo "current=${current}"          >> "$GITHUB_OUTPUT"
          echo "previous=${prev}"            >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)"  >> "$GITHUB_OUTPUT"

      # ── Patch file ─────────────────────────────────────────────────────────
      - name: Generate patch file
        id: patch
        run: |
          current="${{ steps.meta.outputs.current }}"
          prev="${{ steps.meta.outputs.previous }}"
          if [[ -n "${prev}" ]]; then
            name="${prev}-to-${current}.patch"
            git diff "${prev}" "${current}" > "${name}"
            echo "name=${name}" >> "$GITHUB_OUTPUT"
          else
            echo "name="        >> "$GITHUB_OUTPUT"
          fi

      # ── Release notes & README ─────────────────────────────────────────────
      - name: Generate release notes and README
        env:
          CURRENT:    ${{ steps.meta.outputs.current }}
          PREVIOUS:   ${{ steps.meta.outputs.previous }}
          DATE:       ${{ steps.meta.outputs.date }}
          REPO:       ${{ github.repository }}
          PATCH_FILE: ${{ steps.patch.outputs.name }}
        run: |
          python3 .github/scripts/gen_release.py
          echo "--- workspace after gen_release ---"
          ls -la release_notes.md README.txt

      # ── Source archive checksums ───────────────────────────────────────────
      # GitHub makes the tag archives available immediately after the tag push,
      # before a release object exists.  Download both and hash them so
      # sha512sum.txt can ship alongside the release in one step.
      - name: Compute sha512 checksums for source archives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG:      ${{ steps.meta.outputs.current }}
          REPO:     ${{ github.repository }}
        run: |
          base="https://github.com/${REPO}/archive/refs/tags"
          curl -fsSL -H "Authorization: token ${GH_TOKEN}" \
            "${base}/${TAG}.tar.gz" -o "${TAG}.tar.gz"
          curl -fsSL -H "Authorization: token ${GH_TOKEN}" \
            "${base}/${TAG}.zip"    -o "${TAG}.zip"
          sha512sum "${TAG}.tar.gz" "${TAG}.zip" > sha512sum.txt
          echo "--- sha512sum.txt ---"
          cat sha512sum.txt

      # ── Stage assets ───────────────────────────────────────────────────────
      - name: Assemble release assets
        run: |
          pf="${{ steps.patch.outputs.name }}"

          for f in release_notes.md README.txt sha512sum.txt; do
            [[ -f "${f}" ]] \
              || { echo "::error::${f} not found"; exit 1; }
          done

          mkdir -p _dist
          cp README.txt sha512sum.txt _dist/
          [[ -n "${pf}" && -f "${pf}" ]] && cp "${pf}" _dist/

          echo "--- _dist ---"
          ls -la _dist/

      # ── Publish ────────────────────────────────────────────────────────────
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.meta.outputs.current }} (${{ steps.meta.outputs.date }})"
          body_path: release_notes.md
          files: _dist/*
